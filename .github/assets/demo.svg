<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 830 540" width="830" height="540">
  <defs>
    <linearGradient id="glow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(0,184,72,0.06)"/><stop offset="100%" stop-color="transparent"/>
    </linearGradient>
  </defs>
  <style>
    @keyframes pulse{0%,100%{opacity:.85}50%{opacity:1}}
    @keyframes glow{0%,100%{opacity:.7}50%{opacity:1}}
    @keyframes blink{0%,49%{opacity:1}50%,100%{opacity:0}}
    .pulse{animation:pulse 3s ease-in-out infinite}
    .glow{animation:glow 4s ease-in-out infinite}
    .blink{animation:blink 1s step-end infinite}
  </style>
  <!-- Background -->
  <rect width="830" height="540" fill="#0f0f0f"/>
  <!-- Terminal container -->
  <rect x="24" y="24" width="782" height="492" rx="12" fill="#111111" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <!-- Title bar -->
  <rect x="24" y="24" width="782" height="36" rx="12" fill="#1a1a1a"/>
  <rect x="24" y="48" width="782" height="12" fill="#1a1a1a"/>
  <!-- Traffic lights -->
  <circle cx="50" cy="42" r="6" fill="#ff5f56"/>
  <circle cx="70" cy="42" r="6" fill="#ffbd2e"/>
  <circle cx="90" cy="42" r="6" fill="#27c93f"/>
  <text x="415" y="47" text-anchor="middle" font-family="Monaco,Menlo,'Courier New',monospace" font-size="12" fill="rgba(255,255,255,0.44)">terminal &#8212; godmode</text>
  <!-- Line 1: $ claude -->
  <text x="48" y="88" font-family="Monaco,Menlo,'Courier New',monospace" font-size="13" fill="rgba(255,255,255,0.9)">
    <tspan fill="#579dfb">$ </tspan>claude</text>
  <!-- Line 2: prompt -->
  <text x="48" y="112" font-family="Monaco,Menlo,'Courier New',monospace" font-size="13">
    <tspan fill="rgba(255,255,255,0.75)">&gt; </tspan><tspan fill="rgba(255,255,255,0.9)">Build me a dashboard for our analytics data</tspan></text>
  <!-- Line 3: GodMode activated -->
  <text x="48" y="152" font-family="Monaco,Menlo,'Courier New',monospace" font-size="13" class="pulse">
    <tspan fill="#0099ff">&#x26A1; GodMode activated</tspan></text>
  <!-- Pipeline -->
  <text x="64" y="176" font-family="Monaco,Menlo,'Courier New',monospace" font-size="13">
    <tspan fill="rgba(255,255,255,0.2)">&#x251C;&#x2500; </tspan><tspan fill="#b090f8">intent-discovery</tspan><tspan fill="rgba(255,255,255,0.44)">    What data sources? What metrics matter?</tspan></text>
  <text x="64" y="200" font-family="Monaco,Menlo,'Courier New',monospace" font-size="13">
    <tspan fill="rgba(255,255,255,0.2)">&#x251C;&#x2500; </tspan><tspan fill="#b090f8">reference-engine</tspan><tspan fill="rgba(255,255,255,0.44)">    Found: tremor.so (4.2k&#x2605;), shadcn charts, recharts</tspan></text>
  <text x="64" y="224" font-family="Monaco,Menlo,'Courier New',monospace" font-size="13">
    <tspan fill="rgba(255,255,255,0.2)">&#x251C;&#x2500; </tspan><tspan fill="#b090f8">codebase-research</tspan><tspan fill="rgba(255,255,255,0.44)">   Matched existing: AuthLayout, ThemeProvider, API client</tspan></text>
  <text x="64" y="248" font-family="Monaco,Menlo,'Courier New',monospace" font-size="13">
    <tspan fill="rgba(255,255,255,0.2)">&#x2514;&#x2500; </tspan><tspan fill="#b090f8">task-planning</tspan><tspan fill="rgba(255,255,255,0.44)">       3 tasks decomposed, 2 parallel-safe</tspan></text>
  <!-- Agent Team header -->
  <text x="48" y="288" font-family="Monaco,Menlo,'Courier New',monospace" font-size="13">
    <tspan fill="rgba(255,255,255,0.9)">&#x1F680; Deploying Agent Team</tspan><tspan fill="rgba(255,255,255,0.44)"> (3 agents)</tspan></text>
  <!-- Agents -->
  <text x="64" y="312" font-family="Monaco,Menlo,'Courier New',monospace" font-size="13">
    <tspan fill="#b090f8">frontend-eng</tspan><tspan fill="rgba(255,255,255,0.44)">   Dashboard layout + chart components</tspan><tspan fill="#00b848">     &#x2713; done</tspan></text>
  <text x="64" y="336" font-family="Monaco,Menlo,'Courier New',monospace" font-size="13">
    <tspan fill="#b090f8">backend-eng</tspan><tspan fill="rgba(255,255,255,0.44)">    API endpoints + data aggregation</tspan><tspan fill="#00b848">        &#x2713; done</tspan></text>
  <text x="64" y="360" font-family="Monaco,Menlo,'Courier New',monospace" font-size="13">
    <tspan fill="#b090f8">qa-eng</tspan><tspan fill="rgba(255,255,255,0.44)">         E2E tests + accessibility audit</tspan><tspan fill="#00b848">         &#x2713; done</tspan></text>
  <!-- Green glow background -->
  <rect x="24" y="384" width="782" height="68" fill="url(#glow)" class="glow"/>
  <!-- All checks passed -->
  <text x="48" y="408" font-family="Monaco,Menlo,'Courier New',monospace" font-size="13" class="glow">
    <tspan fill="#00b848">&#x2705; All checks passed</tspan></text>
  <!-- Stats line -->
  <text x="64" y="432" font-family="Monaco,Menlo,'Courier New',monospace" font-size="13" class="glow">
    <tspan fill="#00b848">Tests: 24/24</tspan><tspan fill="rgba(255,255,255,0.15)">    &#x2502;    </tspan><tspan fill="#00b848">Lint: 0 errors</tspan><tspan fill="rgba(255,255,255,0.15)">    &#x2502;    </tspan><tspan fill="#00b848">Build: clean</tspan><tspan fill="rgba(255,255,255,0.15)">    &#x2502;    </tspan><tspan fill="#00b848">Coverage: 94%</tspan></text>
  <!-- Cursor -->
  <rect x="48" y="452" width="8" height="16" rx="1" fill="#00b848" class="blink"/>
  <!-- Bottom bar -->
  <rect x="24" y="484" width="782" height="32" rx="0" fill="#1a1a1a"/>
  <rect x="24" y="504" width="782" height="12" rx="12" fill="#1a1a1a"/>
  <rect x="24" y="484" width="782" height="1" fill="rgba(255,255,255,0.1)"/>
  <text x="415" y="504" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="11" fill="rgba(255,255,255,0.44)">GodMode v1.0.0  &#x2022;  32 skills  &#x2022;  Agent Teams  &#x2022;  Zero config</text>
</svg>
